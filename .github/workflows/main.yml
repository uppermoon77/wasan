name: wasan

on:
  # jalan otomatis tiap 12 jam (00:00 dan 12:00 UTC)
  schedule:
    - cron: "0 */12 * * *"
  # bisa dijalankan manual dari tab "Actions"
  workflow_dispatch:
  # jalan juga kalau ada perubahan pada script-nya sendiri
  push:
    paths:
      - "update_github_file.py"

permissions:
  contents: write  # perlu untuk commit ke repo

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub requests

      - name: Run updater
        env:
          GITHUB_PAT: ${{ github.token }}
        run: |
          python update_github_file.py
